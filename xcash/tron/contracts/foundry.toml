[profile.default]
# Tron/TVM 专用源码，独立于 EVM 合约维护和编译。
src = "src"
out = "out"
libs = ["../../evm/contracts/lib"]
test = "test"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 1_000_000
via_ir = true
evm_version = "paris"
auto_detect_remappings = false
skip = ["yul"]

[fmt]
line_length = 100
tab_width = 4
