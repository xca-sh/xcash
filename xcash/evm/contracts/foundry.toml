[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "scripts"
solc_version = "0.8.35"
optimizer = true
# VaultSlot 每次充币都 DELEGATECALL 进 implementation 热路径，runs 拉高换 runtime gas。
optimizer_runs = 1_000_000
via_ir = true
# 合约未使用 cancun 特有 opcode；锁 paris 以兼容部分尚未升级的 L2 / 侧链。
evm_version = "paris"
# 关闭 bytecode 末尾的 solc 元数据 hash，避免改注释 / 重命名变量 / 换路径
# 导致 CREATE2 init_code 漂移、地址漂移。
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [
    { access = "read", path = "./artifacts" },
    { access = "write", path = "../tests/fixtures" },
]
auto_detect_remappings = false
skip = ["yul"]

[fmt]
line_length = 100
tab_width = 4
